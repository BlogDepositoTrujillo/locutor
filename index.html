<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Seguimiento en Tiempo Real</title>
    <!-- Enlaces para cargar el mapa interactivo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #mapa {
            height: 100vh; /* El mapa ocupará toda la pantalla del celular o PC */
            width: 100%;
        }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <!-- Aquí se dibujará el mapa -->
    <div id="mapa"></div>

    <script>
        // 1. Inicializar el mapa centrado en una coordenada base (ej. Colombia)
        const mapa = L.map('mapa').setView([2.9273, -75.2818], 13); 

        // 2. Cargar el diseño del mapa visual
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        // 3. Crear un marcador (el pin del mapa)
        let marcador = L.marker([2.9273, -75.2818]).addTo(mapa)
            .bindPopup('Dispositivo Rastreado')
            .openPopup();

        // 4. FUNCIÓN CLAVE: Esta función se debe ejecutar automáticamente cada vez 
        // que la base de datos reciba una nueva ubicación.
        function actualizarUbicacionEnElMapa(nuevaLatitud, nuevaLongitud) {
            const nuevasCoordenadas = [nuevaLatitud, nuevaLongitud];
            
            // Mueve el pin del mapa a la nueva posición
            marcador.setLatLng(nuevasCoordenadas);
            
            // Centra la cámara del mapa en el nuevo punto
            mapa.setView(nuevasCoordenadas, 16); 
        }

        // SIMULACIÓN: Esto es un ejemplo. En la realidad, este evento se activa 
        // solo cuando recibes datos reales de Firebase de forma remota.
        // setTimeout(() => {
        //    actualizarUbicacionEnElMapa(2.9285, -75.2830);
        // }, 5000);
    </script>
</body>
</html>
