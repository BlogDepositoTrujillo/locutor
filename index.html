<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #mapa { height: 100vh; width: 100%; }
        #estado {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div id="estado">Conectando con el transmisor...</div>
    <div id="mapa"></div>

    <script>
        // Tus datos reales de Firebase ya integrados
        const firebaseConfig = {
            apiKey: "AIzaSyCVatFTkzDlB6Rj2xwAAtz8BK8Ab86g4N4",
            authDomain: "rastreador-gps-ef686.firebaseapp.com",
            databaseURL: "https://rastreador-gps-ef686-default-rtdb.firebaseio.com",
            projectId: "rastreador-gps-ef686",
            storageBucket: "rastreador-gps-ef686.firebasestorage.app",
            messagingSenderId: "563380850657",
            appId: "1:563380850657:web:59cef0fb7abff3e1794ca0"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Inicializa el mapa centrado en una posición neutra
        const mapa = L.map('mapa').setView([2.9273, -75.2818], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        let pinDispositivo = null;

        // Escuchar los datos en tiempo real cuando cambien en Firebase
        database.ref('rastreo/hija').on('value', (snapshot) => {
            const coordenadas = snapshot.val();
            
            if (coordenadas && coordenadas.latitud && coordenadas.longitud) {
                const pos = [coordenadas.latitud, coordenadas.longitud];
                document.getElementById("estado").innerText = "Dispositivo localizado: " + coordenadas.ultima_conexion;

                if (pinDispositivo === null) {
                    // Crea el marcador por primera vez
                    pinDispositivo = L.marker(pos).addTo(mapa).bindPopup('Ubicación de Hija').openPopup();
                    mapa.setView(pos, 16);
                } else {
                    // Mueve el marcador suavemente al nuevo punto detectado
                    pinDispositivo.setLatLng(pos);
                    mapa.panTo(pos);
                }
            } else {
                document.getElementById("estado").innerText = "Esperando la transmisión inicial de coordenadas...";
            }
        });
    </script>
</body>
</html>
